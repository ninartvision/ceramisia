<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Ceramisia</title>
  <script>
    // ═══════════════════════════════════════════════════════
    // GitHub Pages 404 → Dynamic Page Redirect
    // ═══════════════════════════════════════════════════════
    //
    // HOW IT WORKS:
    // 1. User visits ceramisia.com/privacy (or username.github.io/ceramisia/privacy)
    // 2. No such file exists, so GitHub Pages serves this 404.html
    // 3. This script extracts "privacy" from the URL
    // 4. Redirects to page.html?slug=privacy
    // 5. page.html fetches the page content from Sanity CMS
    //
    // SUPPORTS:
    // - Custom domain:  ceramisia.com/privacy        → ceramisia.com/page.html?slug=privacy
    // - GitHub subfolder: user.github.io/ceramisia/privacy → user.github.io/ceramisia/page.html?slug=privacy
    //
    (function () {
      // ── Step 1: Get the full pathname ──
      // Example: "/ceramisia/privacy" or "/privacy"
      var path = window.location.pathname;

      // ── Step 2: Remove trailing slash ──
      // "/privacy/" → "/privacy"
      if (path.length > 1 && path.charAt(path.length - 1) === '/') {
        path = path.slice(0, -1);
      }

      // ── Step 3: Auto-detect the base path ──
      // On custom domain (ceramisia.com):      base = ""
      // On GitHub Pages (user.github.io/ceramisia): base = "/ceramisia"
      //
      // Detection: if the hostname contains "github.io", we're on
      // GitHub Pages and the first path segment is the repo name.
      var base = '';
      if (window.location.hostname.indexOf('github.io') !== -1) {
        // Extract repo name from first segment: "/ceramisia/privacy" → "ceramisia"
        var segments = path.split('/').filter(Boolean); // remove empty strings
        if (segments.length > 0) {
          base = '/' + segments[0];          // "/ceramisia"
          path = '/' + segments.slice(1).join('/'); // "/privacy"
        }
      }

      // ── Step 4: Extract the slug ──
      // "/privacy" → "privacy"
      // "/terms"   → "terms"
      var slug = path.charAt(0) === '/' ? path.slice(1) : path;

      // ── Step 5: Skip known static pages and folder routes ──
      // Slug matches a top-level clean-URL folder — let the server handle it
      // (the folder has its own index.html; the 404 is a false alarm from a
      // direct URL visit before GitHub Pages resolves the directory).
      var staticPages = [
        '',
        'index',
        'products', 'about', 'contact', 'page',
        '404'
      ];

      // Skip anything with a file extension (css, js, png, jpg, etc.)
      // This prevents redirects for missing assets.
      var hasExtension = slug.indexOf('.') !== -1;

      // Skip asset and cms folders (and clean-URL subfolders of known pages)
      var isAssetPath = (
        slug.indexOf('assets/')   === 0 ||
        slug.indexOf('cms/')      === 0 ||
        slug.indexOf('.github/')  === 0 ||
        slug.indexOf('products/') === 0 ||
        slug.indexOf('about/')    === 0 ||
        slug.indexOf('contact/')  === 0 ||
        slug.indexOf('page/')     === 0
      );

      // ── Step 6: Redirect unknown paths to the CMS page renderer ──
      if (slug && staticPages.indexOf(slug) === -1 && !hasExtension && !isAssetPath) {
        // Build the redirect URL:  /page/?slug=privacy
        var target = base + '/page/?slug=' + encodeURIComponent(slug);
        window.location.replace(target);
      }
      // If we reach here, it's a genuinely missing file — the fallback HTML below is shown.
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #FDFAF6;
      color: #333;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-family: 'Cormorant Garamond', 'Noto Serif Georgian', serif;
      font-size: 8rem;
      line-height: 1;
      color: #8C1C13;
      opacity: 0.1;
      margin-bottom: 0.5rem;
      user-select: none;
    }
    h1 {
      font-family: 'Cormorant Garamond', 'Noto Serif Georgian', serif;
      color: #8C1C13;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      margin-bottom: 1rem;
      max-width: 400px;
      line-height: 1.6;
      color: #555;
    }
    small { color: #999; font-size: 0.8rem; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #8C1C13;
      color: #fff;
      text-decoration: none;
      border-radius: 2px;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .back-link {
      display: block;
      margin-top: 1rem;
      color: #8C1C13;
      font-size: 0.85rem;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
      cursor: pointer;
    }
    .back-link:hover { opacity: 0.7; }
    noscript p {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="error-code" aria-hidden="true">404</div>
  <h1>გვერდი ვერ მოიძებნა</h1>
  <p>
    თქვენ მიერ მოთხოვნილი გვერდი არ არსებობს ან გადატანილია.<br>
    <small>The page you requested does not exist.</small>
  </p>
  <a href="/" class="btn">მთავარზე დაბრუნება</a>
  <a onclick="history.back()" class="back-link">← უკან დაბრუნება</a>
  <noscript>
    <p>JavaScript გათიშულია. გთხოვთ ჩართოთ.</p>
  </noscript>
</body>
</html>
