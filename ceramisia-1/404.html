<!-- filepath: ceramisia/404.html -->
<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ceramisia - Page Not Found</title>
  <script>
    (function () {
      var path = window.location.pathname;

      if (path.length > 1 && path.charAt(path.length - 1) === '/') {
        path = path.slice(0, -1);
      }

      var base = '';
      if (window.location.hostname.indexOf('github.io') !== -1) {
        var segments = path.split('/').filter(Boolean);
        if (segments.length > 0) {
          base = '/' + segments[0];
          path = '/' + segments.slice(1).join('/');
        }
      }

      var slug = path.charAt(0) === '/' ? path.slice(1) : path;

      var staticPages = [
        '', 'index.html', 'products.html', 'about.html',
        'contact.html', 'page.html', '404.html'
      ];

      var hasExtension = slug.indexOf('.') !== -1;

      if (slug && staticPages.indexOf(slug) === -1 && !hasExtension) {
        var target = base + '/page.html?slug=' + encodeURIComponent(slug);
        window.location.replace(target);
      }
    })();
  </script>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #FDFAF6;
      color: #333;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', 'Noto Serif Georgian', serif;
      color: #8C1C13;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    p { margin-bottom: 2rem; max-width: 400px; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      color: #8C1C13;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
    }
    a:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>გვერდი ვერ მოიძებნა.<br>Page not found.</p>
  <a href="index.html">მთავარზე დაბრუნება / Back to Home</a>
  <noscript>
    <p style="margin-top:1rem;font-size:0.85rem;color:#999">
      JavaScript is required for dynamic pages.
    </p>
  </noscript>
</body>
</html>
